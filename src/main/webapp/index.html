<!-- Build a servlet program to check prime number -->

<!DOCTYPE html>
<html>
<head>
<title>Prime Number Checker</title>
<style>
.container {
margin: 20px;
padding: 20px;
width: 300px;
border: 1px solid #ccc;
border-radius: 5px;
}
</style>
</head>

<body>
<div class="container">
<h2>Prime Number Checker</h2>

<form action="prime" method="post">
Enter a number:
<input type="text" name="number" required>
<br><br>
<input type="submit" value="Check">
</form>

</div>
</body>
</html>
