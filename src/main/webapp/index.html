<!-- Build a servlet program to create a cookie to get your name through text box and
press submit button (through HTML) to display greeting message, visit count,
list of cookies with set values and demonstrate cookie expiry -->

<!DOCTYPE html>
<html>
<head>
<title>Cookie Program</title>
</head>

<body>

<h2>Enter Your Name</h2>

<form action="CookieServlet" method="get">
<input type="text" name="userName" required>
<br><br>
<input type="submit" value="Submit">
</form>

</body>
</html>
