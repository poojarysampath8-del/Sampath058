<!-- Build a servlet program using cookies (through HTML form) -->

<!DOCTYPE html>
<html>
<head>
<title>Cookie Example</title>
<style>
.container{
margin:20px;
padding:20px;
width:300px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="container">
<h2>Enter Your Name</h2>

<form action="CookieServlet" method="get">
<input type="text" name="userName" required>
<br><br>
<input type="submit" value="Submit">
</form>

</div>

</body>
</html>
