<!-- Build a Session Management using JSP program for getting session expiry time and
your name through text box and press submit to display greeting message and check expiry -->

<!DOCTYPE html>
<html>
<head>
<title>Session Input</title>
</head>

<body>

<h2>Enter Details</h2>

<form action="welcome.jsp">
Enter your name: <input type="text" name="uname" required><br><br>
Enter session time (in seconds): <input type="number" name="time" required><br><br>

<input type="submit" value="Start Session">
</form>

</body>
</html>
